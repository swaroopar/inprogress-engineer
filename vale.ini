StylesPath = ".github/vale/styles"
MinAlertLevel = error
Packages = Google, Microsoft, write-good, Readability, proselint, Joblint, alex, neighbor, MDX
Vocab = website


[formats]
mdx = md

[*.{md,mdx}]
BlockIgnores = (?s)(^---$.*^---$), (?s)\$\$.*?\$\$
TokenIgnores = ^import [A-Z].+?;, export const, \$.*?\$
BasedOnStyles = Vale, Google, Microsoft, write-good, Readability, proselint, Joblint, alex, neighbor
Vale.Spelling = YES
Readability.FleschKincaid = error
# "simple"/"easy" are deliberate, reader-friendly word choices on this site; keep them.
alex.Condescending = NO